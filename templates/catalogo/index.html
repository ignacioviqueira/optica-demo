{% extends "base.html" %}
{% load static %}

{% block title %}Catálogo — Óptica Demo{% endblock %}

{% block content %}
<style>
  /* ── Tarjetas de producto ────────────────────────────────────────── */
  .producto-card {
    transition: transform .15s ease, box-shadow .15s ease;
    cursor: pointer;
  }
  .producto-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 .625rem 1.5rem rgba(15,23,42,.13) !important;
  }
  .card-img-wrap {
    background: #fff;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    border-radius: .75rem .75rem 0 0;
    overflow: hidden;
  }
  .card-img-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: transform .25s ease;
  }
  .producto-card:hover .card-img-wrap img { transform: scale(1.04); }

  .card-marca {
    font-size: .68rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #94a3b8;
    line-height: 1.2;
  }
  .card-nombre {
    font-size: .9375rem;
    font-weight: 700;
    color: #1e293b;
    line-height: 1.3;
    letter-spacing: -.01em;
  }
  .card-nombre:hover { color: var(--brand-mid); }
  .card-attrs {
    font-size: .78rem;
    color: #94a3b8;
    min-height: 1.05rem;
    line-height: 1.4;
  }
  .card-precio {
    font-size: 1.3rem;
    font-weight: 800;
    color: #1e293b;
    letter-spacing: -.03em;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .card-actions { display: flex; gap: .4rem; }
  .card-actions .btn { font-size: .8rem; }

  /* ── Acordeón de filtros ─────────────────────────────────────────── */
  .filtro-grupo-header {
    cursor: pointer;
    transition: background .1s;
    line-height: 1.3;
  }
  .filtro-grupo-header:hover { background: #f8fafc !important; }
  .filtro-arrow {
    font-size: .72rem;
    color: #94a3b8;
    transition: transform .18s;
    display: inline-block;
    line-height: 1;
  }
  .filtro-grupo-header.collapsed .filtro-arrow { transform: rotate(-90deg); }
</style>

      <path d="M1.5 1.5A.5.5 0 0 1 2 1h12a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.128.334L10 8.692V13.5a.5.5 0 0 1-.342.474l-3 1A.5.5 0 0 1 6 14.5V8.692L1.628 3.834A.5.5 0 0 1 1.5 3.5z"/>
    </svg>
    Filtros

  </button>
</div>

<!-- ── Offcanvas (mobile drawer) ──────────────────────────────────────── -->

{% block scripts %}
<script>
const API_PRODUCTOS = "/api/productos/";
const API_FILTROS   = "/api/filtros/";
const API_CATS      = "/api/categorias/";
const USER_ROL      = "{{ user.rol }}";

let categorias = [];

// ── Helpers ──────────────────────────────────────────────────────────────────

function buildCheckboxGroup(containerId, items, valueKey, labelKey) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = "";
  items.forEach(item => {
    const id = `cb-${containerId}-${item[valueKey]}`.replace(/\s+/g, "_");
    el.insertAdjacentHTML("beforeend",
      `<div class="form-check">
         <input class="form-check-input filtro-check" type="checkbox"
                id="${id}" value="${item[valueKey]}" data-group="${containerId}">
         <label class="form-check-label small" for="${id}">${item[labelKey]}</label>
       </div>`);
  });
}

function checkedValues(group) {
  return [...document.querySelectorAll(`.filtro-check[data-group="${group}"]:checked`)]
    .map(el => el.value);
}

function mergeValues(deskGroup, mobGroup) {
  return [...new Set([...checkedValues(deskGroup), ...checkedValues(mobGroup)])];
}

function buildParams() {
  const cats   = mergeValues("filtro-categorias",  "mob-filtro-categorias");
  const marcas = mergeValues("filtro-marcas",       "mob-filtro-marcas");
  const mats   = mergeValues("filtro-materiales",   "mob-filtro-materiales");
  const formas = mergeValues("filtro-formas",        "mob-filtro-formas");
  const pmin   = (document.getElementById("precio-min").value
               || document.getElementById("mob-precio-min").value);
  const pmax   = (document.getElementById("precio-max").value
               || document.getElementById("mob-precio-max").value);
  const q      = document.getElementById("buscador").value.trim();

  const p = new URLSearchParams();
  if (cats.length === 1) p.set("categoria", cats[0]);
  marcas.forEach(m => p.append("marca", m));
  mats.forEach(m   => p.append("material", m));
  formas.forEach(f  => p.append("forma", f));
  if (pmin) p.set("precio_min", pmin);
  if (pmax) p.set("precio_max", pmax);
  if (q)    p.set("q", q);
  return p;
}

function catNombre(id) {
  const c = categorias.find(c => c.id == id);
  return c ? c.nombre : "";
}

function formatPrecio(n) {
  return "$" + Number(n).toLocaleString("es-AR", { maximumFractionDigits: 0 });
}

function sortProductos(productos, orden) {
  if (!orden) return productos;
  const arr = [...productos];
  if      (orden === "precio_asc")  arr.sort((a, b) => a.precio - b.precio);
  else if (orden === "precio_desc") arr.sort((a, b) => b.precio - a.precio);
  else if (orden === "nombre")      arr.sort((a, b) => a.nombre.localeCompare(b.nombre, "es"));
  return arr;
}

// ── Contadores de filtros activos ─────────────────────────────────────────────

function actualizarContadores() {
  const grupos = [
    ["filtro-categorias",  "mob-filtro-categorias"],
    ["filtro-marcas",      "mob-filtro-marcas"],
    ["filtro-materiales",  "mob-filtro-materiales"],
    ["filtro-formas",      "mob-filtro-formas"],
  ];
  let total = 0;
  grupos.forEach(([desk, mob]) => {
    const count = mergeValues(desk, mob).length;
    total += count;
    [desk, mob].forEach(group => {
      const badge = document.querySelector(`[data-count-group="${group}"]`);
      if (badge) {
        badge.textContent = count;
        badge.classList.toggle("d-none", count === 0);
      }
    });
  });
  const badgeTotal = document.getElementById("badge-filtros-activos");
  if (badgeTotal) {
    badgeTotal.textContent = total;
    badgeTotal.classList.toggle("d-none", total === 0);
  }
}

// ── Acordeón ──────────────────────────────────────────────────────────────────

document.querySelectorAll(".filtro-grupo-header").forEach(btn => {
  btn.addEventListener("click", function () {
    const bodyId = this.dataset.filtroBody;
    const body   = document.getElementById(bodyId);
    if (!body) return;
    const closing = !body.classList.contains("d-none");
    body.classList.toggle("d-none", closing);
    this.classList.toggle("collapsed", closing);
  });
});

document.addEventListener("change", e => {
  if (e.target.classList.contains("filtro-check")) actualizarContadores();
});

// ── Renderizado ───────────────────────────────────────────────────────────────

function renderProductos(productos) {
  const grilla  = document.getElementById("grilla-productos");
  const noRes   = document.getElementById("sin-resultados");
  const countEl = document.getElementById("resultado-count");
  const tpl     = document.getElementById("tpl-tarjeta");
  grilla.innerHTML = "";

  if (countEl) {
    const n = productos.length;
    countEl.textContent = n === 1 ? "1 modelo" : `${n} modelos`;
  }

  if (!productos.length) {
    noRes.classList.remove("d-none");
    return;
  }
  noRes.classList.add("d-none");

  const esStaff  = USER_ROL === "ventas" || USER_ROL === "gerencia";
  const orden    = document.getElementById("ordenar").value;
  const lista    = sortProductos(productos, orden);

  lista.forEach(p => {
    const clone     = tpl.content.cloneNode(true);
    const catNom    = catNombre(p.categoria);
    const detailUrl = `/catalogo/${p.id}/`;
    const esArmazon = catNom === "Armazones";

    // Imagen
    const img = clone.querySelector(".card-img-wrap img");
    if (p.imagen_url) {
      img.src = p.imagen_url;
      img.alt = `${p.marca} ${p.nombre}`;
    } else {
      img.style.display = "none";
      clone.querySelector(".card-img-wrap").insertAdjacentHTML("beforeend",
        `<span class="text-muted fw-bold" style="font-size:2.5rem;">${p.marca[0]}</span>`);
    }

    // Links: imagen + nombre → detalle
    clone.querySelector("a.card-img-link").href = detailUrl;
    clone.querySelector("a.nombre-link").href   = detailUrl;

    // Texto
    clone.querySelector(".marca-producto").textContent  = p.marca.toUpperCase();
    clone.querySelector(".nombre-producto").textContent = p.nombre;

    const attrs = [p.material, p.forma].filter(Boolean).join(" · ");
    clone.querySelector(".attrs-producto").textContent = attrs || "";

    clone.querySelector(".precio-producto").textContent = formatPrecio(p.precio);

    // Botón VTO — solo armazones
    const btnVto = clone.querySelector(".btn-vto");
    if (esArmazon) {
      btnVto.href = `/vto/?producto=${p.id}`;
      btnVto.classList.remove("d-none");
    } else {
      btnVto.remove();
    }

    // Botón carrito
    const btnCarrito = clone.querySelector(".btn-carrito");
    if (esStaff) {
      btnCarrito.remove();
    } else {
      btnCarrito.dataset.id     = p.id;
      btnCarrito.dataset.nombre = p.nombre;
      btnCarrito.dataset.precio = p.precio;
      if (p.stock_actual === 0) {
        btnCarrito.disabled = true;
        btnCarrito.title    = "Sin stock disponible";
      }
      // Si no hay botón VTO, el carrito ocupa todo el ancho
      if (!esArmazon) btnCarrito.classList.add("w-100");
    }

    grilla.appendChild(clone);
  });
}

// ── Carga de datos ────────────────────────────────────────────────────────────

async function cargarFiltros() {
  const [filtrosRes, catsRes] = await Promise.all([
    fetch(API_FILTROS), fetch(API_CATS)
  ]);
  const filtros  = await filtrosRes.json();
  const catsData = await catsRes.json();
  categorias     = catsData.results ?? catsData;

  buildCheckboxGroup("filtro-categorias",     categorias, "id", "nombre");
  buildCheckboxGroup("mob-filtro-categorias", categorias, "id", "nombre");

  const marcasItems = (filtros.marcas || []).map(m => ({v: m, l: m}));
  buildCheckboxGroup("filtro-marcas",     marcasItems, "v", "l");
  buildCheckboxGroup("mob-filtro-marcas", marcasItems, "v", "l");

  const matsItems = (filtros.materiales || []).map(m => ({v: m, l: m}));
  buildCheckboxGroup("filtro-materiales",     matsItems, "v", "l");
  buildCheckboxGroup("mob-filtro-materiales", matsItems, "v", "l");

  const formasItems = (filtros.formas || []).map(f => ({v: f, l: f}));
  buildCheckboxGroup("filtro-formas",     formasItems, "v", "l");
  buildCheckboxGroup("mob-filtro-formas", formasItems, "v", "l");
}

async function cargarProductos() {
  const carga  = document.getElementById("estado-carga");
  const grilla = document.getElementById("grilla-productos");
  const noRes  = document.getElementById("sin-resultados");
  carga.classList.remove("d-none");
  grilla.innerHTML = "";
  noRes.classList.add("d-none");

  try {
    const params = buildParams();
    const res    = await fetch(`${API_PRODUCTOS}?${params}`);
    const data   = await res.json();
    renderProductos(data.results ?? data);
  } catch (e) {
    console.error("Error al cargar productos:", e);
    noRes.innerHTML = `
      <div class="display-6 mb-2">⚠️</div>
      <p class="text-muted">No se pudo cargar el catálogo. Verificá tu conexión.</p>
      <button class="btn btn-outline-primary" onclick="cargarProductos()">Reintentar</button>`;
    noRes.classList.remove("d-none");
  } finally {
    carga.classList.add("d-none");
  }
}

function limpiarFiltros() {
  document.querySelectorAll(".filtro-check").forEach(cb => cb.checked = false);
  ["precio-min", "precio-max", "mob-precio-min", "mob-precio-max"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = "";
  });
  document.getElementById("buscador").value = "";
  document.getElementById("ordenar").value  = "";
  actualizarContadores();
  cargarProductos();
}

// ── Carrito (localStorage) ────────────────────────────────────────────────────

document.getElementById("grilla-productos").addEventListener("click", e => {
  const btn = e.target.closest(".btn-carrito");
  if (!btn || btn.disabled) return;

  const { id, nombre, precio } = btn.dataset;
  const carrito = JSON.parse(localStorage.getItem("carrito") || "[]");
  const idx = carrito.findIndex(i => i.id == id);
  if (idx >= 0) {
    carrito[idx].cantidad += 1;
  } else {
    carrito.push({ id, nombre, precio: parseFloat(precio), cantidad: 1 });
  }
  localStorage.setItem("carrito", JSON.stringify(carrito));

  btn.textContent = "✓ Agregado";
  btn.classList.replace("btn-primary", "btn-success");
  setTimeout(() => {
    btn.textContent = "+ Carrito";
    btn.classList.replace("btn-success", "btn-primary");
  }, 1500);

  actualizarContadorCarrito();
});

function actualizarContadorCarrito() {
  const carrito = JSON.parse(localStorage.getItem("carrito") || "[]");
  const total = carrito.reduce((s, i) => s + i.cantidad, 0);
  const badge = document.getElementById("badge-carrito");
  if (badge) {
    badge.textContent = total;
    badge.classList.toggle("d-none", total === 0);
  }
}

// ── Eventos ───────────────────────────────────────────────────────────────────

document.getElementById("btn-filtrar").addEventListener("click",    cargarProductos);
document.getElementById("btn-limpiar").addEventListener("click",    limpiarFiltros);
document.getElementById("btn-limpiar-sr").addEventListener("click", limpiarFiltros);
document.getElementById("btn-buscar").addEventListener("click",     cargarProductos);
document.getElementById("mob-btn-filtrar").addEventListener("click", cargarProductos);
document.getElementById("mob-btn-limpiar").addEventListener("click", limpiarFiltros);
document.getElementById("ordenar").addEventListener("change", cargarProductos);
document.getElementById("buscador").addEventListener("keydown", e => {
  if (e.key === "Enter") cargarProductos();
});

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  await cargarFiltros();
  await cargarProductos();
  actualizarContadorCarrito();
})();
</script>
{% endblock %}
